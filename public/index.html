<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Mok Company — Standup Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"/>
<style>
  /* ── Reset & Variables ──────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0A0D14;
    --bg2:       #0F1320;
    --surface:   #141927;
    --surface2:  #1C2333;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --text:      #E8ECF4;
    --text2:     #8B95A9;
    --text3:     #5A6478;
    --accent:    #4F8EF7;
    --accent2:   #7B5EA7;
    --green:     #34C77B;
    --red:       #F05252;
    --yellow:    #F0B429;
    --orange:    #F08C00;
    --radius:    14px;
    --radius-sm: 8px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise texture overlay ──────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  /* ── Ambient glow blobs ─────────────────────────────────────────────────── */
  .blob {
    position: fixed; border-radius: 50%; filter: blur(120px);
    pointer-events: none; z-index: 0; opacity: 0.12;
    animation: blobFloat 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 600px; height: 600px; background: #1A3A6B; top: -200px; left: -200px; animation-delay: 0s; }
  .blob-2 { width: 500px; height: 500px; background: #4A235A; bottom: -100px; right: -100px; animation-delay: -5s; }
  .blob-3 { width: 300px; height: 300px; background: #145A32; top: 40%; left: 40%; animation-delay: -3s; }
  @keyframes blobFloat { from { transform: scale(1) translate(0,0); } to { transform: scale(1.1) translate(30px, -20px); } }

  /* ── Layout ─────────────────────────────────────────────────────────────── */
  #app { position: relative; z-index: 1; max-width: 1600px; margin: 0 auto; padding: 0 24px 60px; }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
    flex-wrap: wrap; gap: 20px;
  }
  .header-left h1 {
    font-family: var(--font-head);
    font-size: clamp(22px, 3vw, 32px);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #E8ECF4 0%, #8B95A9 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-left p { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .status-pill {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 14px; border-radius: 100px;
    background: var(--surface2); border: 1px solid var(--border2);
    font-size: 12px; color: var(--text2);
  }
  .status-pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px; border-radius: var(--radius-sm);
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 20px rgba(79,142,247,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,142,247,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary.loading { opacity: 0.7; pointer-events: none; }

  /* ── Date/Time bar ───────────────────────────────────────────────────────── */
  .datebar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--border);
    margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
  }
  .datebar-date { font-family: var(--font-head); font-size: 15px; font-weight: 700; }
  .datebar-meta { font-size: 12px; color: var(--text3); }
  .datebar-right { display: flex; gap: 20px; flex-wrap: wrap; }
  .stat-chip { text-align: center; }
  .stat-chip .num { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: var(--accent); }
  .stat-chip .lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Section title ───────────────────────────────────────────────────────── */
  .section-title {
    font-family: var(--font-head); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 2px; color: var(--text3);
    margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Project grid ────────────────────────────────────────────────────────── */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px; margin-bottom: 40px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    animation: fadeUp 0.5s ease both;
  }
  .project-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    border-color: var(--border2);
  }
  @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  .project-card:nth-child(1) { animation-delay: 0.05s; }
  .project-card:nth-child(2) { animation-delay: 0.10s; }
  .project-card:nth-child(3) { animation-delay: 0.15s; }
  .project-card:nth-child(4) { animation-delay: 0.20s; }

  .card-accent { height: 4px; }
  .card-body { padding: 20px; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .card-title-wrap { display: flex; align-items: center; gap: 10px; }
  .card-emoji { font-size: 22px; line-height: 1; }
  .card-name { font-family: var(--font-head); font-size: 17px; font-weight: 700; }
  .card-badge {
    font-size: 10px; padding: 3px 9px; border-radius: 100px;
    background: rgba(255,255,255,0.07); color: var(--text3);
    border: 1px solid var(--border);
  }

  /* Activity feed */
  .activity-feed { margin-bottom: 16px; }
  .activity-item {
    display: flex; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--text2);
    flex-shrink: 0; overflow: hidden;
  }
  .activity-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .activity-content { flex: 1; min-width: 0; }
  .activity-user { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 2px; }
  .activity-text { font-size: 12px; color: var(--text3); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .activity-time { font-size: 10px; color: var(--text3); margin-top: 3px; }

  /* Card metrics */
  .card-metrics { display: flex; gap: 12px; margin-top: 14px; }
  .metric { flex: 1; background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; text-align: center; border: 1px solid var(--border); }
  .metric .val { font-family: var(--font-head); font-size: 18px; font-weight: 800; }
  .metric .key { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* Members strip */
  .members-strip { display: flex; align-items: center; margin-top: 14px; gap: 8px; }
  .member-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--surface2); border: 2px solid var(--bg);
    margin-right: -8px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--text);
    overflow: hidden; flex-shrink: 0;
  }
  .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .member-more { font-size: 11px; color: var(--text3); margin-left: 14px; }

  /* Blocker badge */
  .blocker-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 4px 10px; border-radius: 100px;
    background: rgba(240,82,82,0.12); color: var(--red);
    border: 1px solid rgba(240,82,82,0.25); margin-top: 10px;
  }

  /* ── Task board panel ────────────────────────────────────────────────────── */
  .tasks-section { margin-top: 8px; }

  .tasks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .task-column {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .task-col-header {
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .task-col-title { font-family: var(--font-head); font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .task-count { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 100px; color: var(--text3); }

  .task-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px;
    transition: border-color 0.2s;
  }
  .task-item:hover { border-color: var(--border2); }
  .task-item-id { font-size: 10px; color: var(--text3); font-weight: 600; margin-bottom: 5px; }
  .task-item-text { font-size: 12px; line-height: 1.5; color: var(--text); }
  .task-item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .task-item-from { font-size: 10px; color: var(--text3); }
  .task-pill {
    font-size: 9px; padding: 2px 8px; border-radius: 100px; font-weight: 600;
  }
  .pill-todo     { background: rgba(139,149,169,0.15); color: var(--text3); }
  .pill-progress { background: rgba(79,142,247,0.15); color: var(--accent); }
  .pill-blocked  { background: rgba(240,82,82,0.15); color: var(--red); }
  .pill-done     { background: rgba(52,199,123,0.15); color: var(--green); }

  /* ── Loading state ───────────────────────────────────────────────────────── */
  .loading-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 50vh; gap: 20px;
  }
  .spinner {
    width: 44px; height: 44px; border-radius: 50%;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text3); }

  /* ── Empty state ─────────────────────────────────────────────────────────── */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }

  /* ── Last updated ticker ─────────────────────────────────────────────────── */
  .ticker {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 8px 14px;
    font-size: 11px; color: var(--text3); z-index: 100;
    backdrop-filter: blur(8px);
  }

  /* ── Tabs ────────────────────────────────────────────────────────────────── */
  .tabs { display: flex; gap: 4px; margin-bottom: 28px; flex-wrap: wrap; }
  .tab {
    padding: 8px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); transition: all 0.18s; font-family: var(--font-body);
  }
  .tab:hover { border-color: var(--border2); color: var(--text); }
  .tab.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(79,142,247,0.3);
  }

  /* ── Responsive ─────────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    #app { padding: 0 14px 60px; }
    .projects-grid, .tasks-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>The Mok Company — Standup Board</h1>
      <p id="subtitle">Loading live data from Slack...</p>
    </div>
    <div class="header-right">
      <div class="status-pill">
        <span class="dot"></span>
        <span id="live-label">Live</span>
      </div>
      <button class="btn btn-primary" id="refreshBtn" onclick="refreshData()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Refresh Now
      </button>
    </div>
  </div>

  <!-- Date bar -->
  <div class="datebar">
    <div>
      <div class="datebar-date" id="currentDate"></div>
      <div class="datebar-meta">Auto-refreshes every weekday at 8:00 AM Cairo time</div>
    </div>
    <div class="datebar-right" id="globalStats">
      <div class="stat-chip"><div class="num" id="stat-projects">4</div><div class="lbl">Projects</div></div>
      <div class="stat-chip"><div class="num" id="stat-members">—</div><div class="lbl">Members</div></div>
      <div class="stat-chip"><div class="num" id="stat-tasks">—</div><div class="lbl">Tasks</div></div>
      <div class="stat-chip"><div class="num" id="stat-blockers">—</div><div class="lbl">Blockers</div></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('projects', this)">📊 Projects Overview</button>
    <button class="tab" onclick="switchTab('tasks', this)">📋 All Tasks</button>
    <button class="tab" onclick="switchTab('blockers', this)">🚫 Blockers</button>
    <button class="tab" onclick="switchTab('activity', this)">⚡ Recent Activity</button>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Connecting to Slack...</div>
    </div>
  </div>
</div>

<!-- Last updated -->
<div class="ticker" id="ticker">⏱ Fetching...</div>

<script>
let allData = null;

// ── Date display ──────────────────────────────────────────────────────────────
const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const now = new Date();
document.getElementById('currentDate').textContent =
  `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (!allData) return;
  renderTab(tab, allData);
}

// ── Avatar helper ─────────────────────────────────────────────────────────────
function avatarEl(name, imgUrl) {
  const initials = name ? name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase() : '?';
  if (imgUrl) return `<div class="member-avatar"><img src="${imgUrl}" alt="${name}" onerror="this.parentElement.textContent='${initials}'"/></div>`;
  return `<div class="member-avatar">${initials}</div>`;
}

function activityAvatarEl(name, imgUrl) {
  const initials = name ? name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase() : '?';
  if (imgUrl) return `<div class="activity-avatar"><img src="${imgUrl}" alt="${name}" onerror="this.parentElement.textContent='${initials}'"/></div>`;
  return `<div class="activity-avatar">${initials}</div>`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

// ── Render: Projects Overview ─────────────────────────────────────────────────
function renderProjects(data) {
  const html = `
    <div class="section-title">Active Projects</div>
    <div class="projects-grid">
      ${data.projects.map(proj => `
        <div class="project-card">
          <div class="card-accent" style="background:${proj.color}"></div>
          <div class="card-body">
            <div class="card-header">
              <div class="card-title-wrap">
                <span class="card-emoji">${proj.emoji}</span>
                <span class="card-name">${proj.name}</span>
              </div>
              <span class="card-badge">${proj.messageCount || 0} msgs</span>
            </div>

            <!-- Members -->
            <div class="members-strip">
              ${proj.members.slice(0,5).map(m => avatarEl(m.name, m.avatar)).join('')}
              ${proj.members.length > 5 ? `<span class="member-more">+${proj.members.length - 5} more</span>` : ''}
              ${proj.members.length === 0 ? `<span style="font-size:12px;color:var(--text3)">No members loaded</span>` : ''}
            </div>

            <!-- Recent activity -->
            <div class="activity-feed" style="margin-top:16px">
              ${proj.recentActivity.length === 0
                ? `<div class="empty" style="padding:16px">No activity in last 24h</div>`
                : proj.recentActivity.slice(0,3).map(a => `
                  <div class="activity-item">
                    ${activityAvatarEl(a.user, null)}
                    <div class="activity-content">
                      <div class="activity-user">${a.user}</div>
                      <div class="activity-text">${a.text || '—'}</div>
                      <div class="activity-time">${timeAgo(a.ts)}</div>
                    </div>
                  </div>`).join('')
              }
            </div>

            <!-- Metrics -->
            <div class="card-metrics">
              <div class="metric">
                <div class="val" style="color:${proj.color}">${proj.tasks.length}</div>
                <div class="key">Tasks</div>
              </div>
              <div class="metric">
                <div class="val" style="color:var(--red)">${proj.blockers.length}</div>
                <div class="key">Blockers</div>
              </div>
              <div class="metric">
                <div class="val" style="color:var(--green)">${proj.members.length}</div>
                <div class="key">Members</div>
              </div>
            </div>

            ${proj.blockers.length > 0
              ? `<div class="blocker-tag">⚠ ${proj.blockers.length} blocker${proj.blockers.length > 1 ? 's' : ''} detected</div>`
              : ''}
          </div>
        </div>
      `).join('')}
    </div>`;
  document.getElementById('content').innerHTML = html;
}

// ── Render: Tasks ─────────────────────────────────────────────────────────────
function renderTasks(data) {
  const allTasks = data.projects.flatMap(p => p.tasks.map(t => ({...t, project: p.name, color: p.color})));

  function statusClass(s) {
    if (!s || s.includes('To Do')) return 'pill-todo';
    if (s.includes('Progress')) return 'pill-progress';
    if (s.includes('Blocked')) return 'pill-blocked';
    if (s.includes('Done')) return 'pill-done';
    return 'pill-todo';
  }

  const html = `
    <div class="section-title">All Tasks · ${allTasks.length} detected from Slack</div>
    <div class="tasks-grid">
      ${data.projects.map((proj, pi) => `
        <div class="task-column" style="animation-delay:${pi*0.08}s">
          <div class="task-col-header">
            <div class="task-col-title">
              <span style="color:${proj.color}">${proj.emoji}</span>
              ${proj.name}
            </div>
            <span class="task-count">${proj.tasks.length}</span>
          </div>
          <div class="task-list">
            ${proj.tasks.length === 0
              ? `<div class="empty">No tasks extracted</div>`
              : proj.tasks.map((t, i) => `
                <div class="task-item">
                  <div class="task-item-id">#${i+1} · from Slack</div>
                  <div class="task-item-text">${t.text}</div>
                  <div class="task-item-footer">
                    <span class="task-item-from">${t.from || '—'}</span>
                    <span class="task-pill ${statusClass(t.status)}">${t.status}</span>
                  </div>
                </div>`).join('')
            }
          </div>
        </div>`).join('')}
    </div>`;
  document.getElementById('content').innerHTML = html;
}

// ── Render: Blockers ──────────────────────────────────────────────────────────
function renderBlockers(data) {
  const all = data.projects.flatMap(p => p.blockers.map(b => ({...b, project: p.name, emoji: p.emoji, color: p.color})));
  const html = `
    <div class="section-title">Detected Blockers · ${all.length} found</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${all.length === 0 ? `<div class="empty" style="padding:60px">✅ No blockers detected right now</div>` :
        all.map(b => `
          <div style="background:var(--surface);border:1px solid rgba(240,82,82,0.2);border-radius:var(--radius);padding:16px;animation:fadeUp 0.4s ease both">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <span style="color:${b.color};font-size:18px">${b.emoji}</span>
              <span style="font-family:var(--font-head);font-weight:700;font-size:13px">${b.project}</span>
              <span style="font-size:11px;color:var(--text3);margin-left:auto">${timeAgo(b.date)}</span>
            </div>
            <div style="font-size:13px;color:var(--text2);line-height:1.6">${b.text}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:8px">Reported by: ${b.user}</div>
          </div>`).join('')
      }
    </div>`;
  document.getElementById('content').innerHTML = html;
}

// ── Render: Activity ──────────────────────────────────────────────────────────
function renderActivity(data) {
  const all = data.projects.flatMap(p =>
    (p.recentActivity || []).map(a => ({...a, project: p.name, emoji: p.emoji, color: p.color}))
  ).sort((a, b) => new Date(b.ts) - new Date(a.ts));

  const html = `
    <div class="section-title">Recent Activity · Last 24 hours</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${all.length === 0 ? `<div class="empty" style="padding:60px">No activity in the last 24 hours</div>` :
        all.map((a, i) => `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;gap:12px;animation:fadeUp 0.4s ease ${i*0.04}s both">
            ${activityAvatarEl(a.user, null)}
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                <span style="font-weight:600;font-size:13px">${a.user}</span>
                <span style="color:${a.color};font-size:12px">${a.emoji} ${a.project}</span>
                <span style="font-size:11px;color:var(--text3);margin-left:auto">${timeAgo(a.ts)}</span>
              </div>
              <div style="font-size:13px;color:var(--text2);line-height:1.5">${a.text || '—'}</div>
            </div>
          </div>`).join('')
      }
    </div>`;
  document.getElementById('content').innerHTML = html;
}

// ── Tab router ────────────────────────────────────────────────────────────────
function renderTab(tab, data) {
  if (tab === 'projects') renderProjects(data);
  else if (tab === 'tasks') renderTasks(data);
  else if (tab === 'blockers') renderBlockers(data);
  else if (tab === 'activity') renderActivity(data);
}

// ── Update global stats ───────────────────────────────────────────────────────
function updateStats(data) {
  const members = new Set(data.projects.flatMap(p => p.members.map(m => m.id))).size;
  const tasks   = data.projects.reduce((s, p) => s + p.tasks.length, 0);
  const blkrs   = data.projects.reduce((s, p) => s + p.blockers.length, 0);
  document.getElementById('stat-members').textContent = members || '—';
  document.getElementById('stat-tasks').textContent   = tasks;
  document.getElementById('stat-blockers').textContent = blkrs;
  document.getElementById('subtitle').textContent = `Last updated ${timeAgo(data.lastUpdated)} · ${data.projects.length} projects active`;
  document.getElementById('ticker').textContent = `⏱ Updated ${timeAgo(data.lastUpdated)}`;
}

// ── Fetch data from server ────────────────────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    allData = data;
    updateStats(data);
    const activeTab = document.querySelector('.tab.active');
    const tabName = activeTab?.textContent.includes('Tasks') ? 'tasks'
      : activeTab?.textContent.includes('Blocker') ? 'blockers'
      : activeTab?.textContent.includes('Activity') ? 'activity'
      : 'projects';
    renderTab(tabName, data);
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="loading-screen">
        <div style="font-size:40px">⚠️</div>
        <div style="color:var(--red);font-size:14px">Could not connect to server</div>
        <div style="color:var(--text3);font-size:12px">${e.message}</div>
        <button class="btn btn-primary" onclick="fetchData()" style="margin-top:12px">Retry</button>
      </div>`;
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');
  btn.textContent = 'Refreshing...';
  try {
    await fetch('/api/refresh', { method: 'POST' });
    await fetchData();
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> Refresh Now`;
  }
}

// ── Auto-refresh every 5 minutes in browser ───────────────────────────────────
setInterval(fetchData, 5 * 60 * 1000);

// ── Init ──────────────────────────────────────────────────────────────────────
fetchData();
</script>
</body>
</html>
