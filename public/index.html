<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mok Company — Standup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060709;--s1:#0d0f14;--s2:#131620;--s3:#1a1e2a;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--text:#dde2f0;--muted:#4a5268;--muted2:#6b7590;--accent:#4f9cf9;--green:#34d399;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,156,249,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,156,249,0.02) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:0.08}
.orb1{width:600px;height:600px;background:var(--accent);top:-200px;right:-150px}
.orb2{width:400px;height:400px;background:var(--purple);bottom:-150px;left:-100px}
header{position:sticky;top:0;z-index:100;background:rgba(6,7,9,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.logo-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.hdr-r{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);color:var(--green);padding:5px 12px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.upd-txt{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.btn-ref{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.btn-ref:hover{background:#3a8de8;transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,156,249,0.3)}
.btn-ref.spin svg{animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
main{position:relative;z-index:1;padding:24px 28px;max-width:1600px;margin:0 auto}
.top-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.ts{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden;transition:border-color 0.2s}
.ts::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--clr,var(--accent));opacity:0.6}
.ts:hover{border-color:var(--border2)}
.ts-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px}
.ts-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--clr,var(--text));line-height:1}
.ts-sub{font-size:11px;color:var(--muted);margin-top:4px}
.tabs{display:flex;gap:2px;margin-bottom:24px;background:var(--s1);border:1px solid var(--border);padding:3px;border-radius:10px;width:fit-content}
.t{padding:7px 18px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;transition:all 0.15s;white-space:nowrap}
.t.on{background:var(--s3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.t:hover:not(.on){color:var(--text)}
.shdr{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.shdr::after{content:'';flex:1;height:1px;background:var(--border)}
.pg{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:1100px){.pg{grid-template-columns:1fr}}
.pc{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.2s;position:relative}
.pc:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.pc-bar{position:absolute;top:0;left:0;bottom:0;width:3px}
.pc-h{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pc-t{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;gap:10px}
.pc-d{width:9px;height:9px;border-radius:50%;box-shadow:0 0 8px var(--c)}
.pc-bs{display:flex;gap:6px;align-items:center}
.b{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500}
.bm{background:rgba(79,156,249,0.08);color:var(--accent);border:1px solid rgba(79,156,249,0.15)}
.be{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.bb{background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
.bok{background:rgba(52,211,153,0.08);color:var(--green);border:1px solid rgba(52,211,153,0.15)}
.pc-mem{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;align-items:center;min-height:44px}
.mc{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--border);padding:3px 9px 3px 3px;border-radius:20px;font-size:11px}
.av{border-radius:50%;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.aph{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:500;color:#fff;flex-shrink:0;font-size:9px}
.pc-b{padding:14px 20px 18px}
.pcs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.ms{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
.mv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1}
.ml{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.af{display:flex;flex-direction:column;gap:6px}
.ai{display:flex;gap:8px;padding:8px 10px;background:var(--s2);border-radius:8px;border:1px solid var(--border);transition:border-color 0.15s}
.ai:hover{border-color:var(--border2)}
.ab{flex:1;min-width:0}
.au{font-weight:600;font-size:11px;color:var(--accent);margin-bottom:2px}
.at{font-size:11px;color:var(--muted2);line-height:1.5;word-break:break-word}
.at2{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:3px}
.noa{font-size:11px;color:var(--muted);font-style:italic;padding:6px 0;text-align:center}
.suw{display:flex;flex-direction:column;gap:10px}
.suc{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.2s}
.suc:hover{border-color:var(--border2)}
.suh{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.sun{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.sut{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto}
.sub{padding:12px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:800px){.sub{grid-template-columns:1fr}}
.suss{background:var(--s2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
.susl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.sust{font-size:12px;color:var(--muted2);line-height:1.6}
.sur{padding:12px 16px;font-size:12px;color:var(--muted2);line-height:1.7;border-top:1px solid var(--border)}
.sue{padding:32px;text-align:center;color:var(--muted);font-size:12px;line-height:1.8}
.tw{display:flex;flex-direction:column;gap:6px}
.tr{display:flex;align-items:center;gap:12px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px 16px;transition:all 0.15s}
.tr:hover{border-color:var(--border2);background:var(--s2)}
.tn{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:22px;text-align:right;flex-shrink:0}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tt{flex:1;font-size:13px;line-height:1.5}
.tm{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tp{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);background:var(--s2);border:1px solid var(--border);padding:2px 8px;border-radius:10px}
.ta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.bw{display:flex;flex-direction:column;gap:8px}
.bc{background:var(--s1);border:1px solid rgba(248,113,113,0.15);border-radius:12px;padding:14px 18px;position:relative;overflow:hidden}
.bc::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--red);opacity:0.6}
.bch{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bcu{font-weight:600;font-size:13px;color:var(--red)}
.bcp{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:var(--s2);margin-left:auto}
.bca{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.bct{font-size:12px;color:var(--muted2);line-height:1.7}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.dc{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all 0.2s}
.dc:hover{border-color:var(--border2);transform:translateY(-1px)}
.dct{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dn{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;line-height:1.2}
.dp{font-size:11px;color:var(--muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px}
.dpt{padding:1px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;border:1px solid var(--border)}
.dsr{display:flex;gap:6px;flex-wrap:wrap}
.dpl{font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;border-radius:20px;display:flex;align-items:center;gap:4px;border:1px solid var(--border)}
.empty{padding:48px 24px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8}
#loading{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.ldl{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.ldb{width:200px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden}
.ldf{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;animation:lda 1.5s ease-in-out infinite}
@keyframes lda{0%{width:0;margin-left:0}50%{width:70%;margin-left:0}100%{width:10%;margin-left:90%}}
.ldt{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
#toast{position:fixed;bottom:24px;right:24px;z-index:200;background:var(--s3);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:12px;color:var(--text);display:none;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.hidden{display:none!important}
.fade{animation:fd 0.3s ease forwards}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div id="loading"><div class="ldl">The Mok Company</div><div class="ldb"><div class="ldf"></div></div><div class="ldt">Loading standup data…</div></div>
<div id="toast"></div>
<header>
  <div class="logo"><div class="logo-mark">M</div>The Mok Company<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);font-weight:400;margin-left:4px">/ Standup</span></div>
  <div class="hdr-r">
    <span class="upd-txt" id="upd">—</span>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <button class="btn-ref" id="refBtn" onclick="doRef()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Refresh</button>
  </div>
</header>
<main>
  <div class="top-stats">
    <div class="ts" style="--clr:var(--accent)"><div class="ts-lbl">Today</div><div class="ts-val" id="sd">—</div><div class="ts-sub" id="st">—</div></div>
    <div class="ts" style="--clr:var(--accent)"><div class="ts-lbl">Projects</div><div class="ts-val" id="sp">—</div><div class="ts-sub">active</div></div>
    <div class="ts" style="--clr:var(--green)"><div class="ts-lbl">Tasks</div><div class="ts-val" id="stk">—</div><div class="ts-sub">from channels</div></div>
    <div class="ts" style="--clr:var(--red)"><div class="ts-lbl">Blockers</div><div class="ts-val" id="sb">—</div><div class="ts-sub">detected</div></div>
    <div class="ts" style="--clr:var(--purple)"><div class="ts-lbl">Standups</div><div class="ts-val" id="ss">—</div><div class="ts-sub">from #standup</div></div>
  </div>
  <div class="tabs">
    <button class="t on" onclick="tab('o',this)">🏠 Overview</button>
    <button class="t" onclick="tab('s',this)">📋 Standup</button>
    <button class="t" onclick="tab('t',this)">✅ Tasks</button>
    <button class="t" onclick="tab('b',this)">🚨 Blockers</button>
    <button class="t" onclick="tab('m',this)">👥 Team</button>
  </div>
  <div id="vo"><div class="shdr">Active Projects</div><div class="pg" id="pg"></div></div>
  <div id="vs" class="hidden"><div class="shdr">#standup — today's updates</div><div class="suw" id="suw"></div></div>
  <div id="vt" class="hidden"><div class="shdr">All tasks from channels</div><div class="tw" id="tw"></div></div>
  <div id="vb" class="hidden"><div class="shdr">Blockers detected</div><div class="bw" id="bw"></div></div>
  <div id="vm" class="hidden"><div class="shdr">Team members</div><div class="tgrid" id="tg"></div></div>
</main>
<script>
const PC={'CairoLive':'#e85d4a','Al Nasser':'#34d399','Print Out':'#a78bfa','Turbo':'#fbbf24'};
const AC=['#4f9cf9','#34d399','#fbbf24','#e85d4a','#a78bfa','#06b6d4','#ec4899','#84cc16'];
function gc(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return AC[Math.abs(h)%AC.length];}
function ini(n){if(!n)return '?';const p=n.trim().split(' ');return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.substring(0,2).toUpperCase();}
function av(m,sz){const s=sz||22,n=(m&&m.name)?m.name:(typeof m==='string'?m:'?'),c=gc(n);if(m&&m.avatar)return `<img src="${m.avatar}" width="${s}" height="${s}" class="av" style="width:${s}px;height:${s}px" onerror="this.outerHTML='<div class=aph style=width:${s}px;height:${s}px;background:${c}>${ini(n)}</div>'">`;return `<div class="aph" style="width:${s}px;height:${s}px;background:${c}">${ini(n)}</div>`;}
function ago(iso){if(!iso)return '';const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/60000);if(m<1)return 'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function xe(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function rOver(ps){
  document.getElementById('pg').innerHTML=ps.map((p,i)=>{
    const col=PC[p.name]||'#4f9cf9';
    const mems=p.members&&p.members.length?p.members.slice(0,7).map(m=>`<div class="mc">${av(m,20)}<span>${xe(m.name.split(' ')[0])}</span></div>`).join('')+(p.members.length>7?`<span style="font-size:10px;color:var(--muted)">+${p.members.length-7}</span>`:''):'<span style="font-size:11px;color:var(--muted)">No members</span>';
    const acts=p.recentActivity&&p.recentActivity.length?p.recentActivity.slice(0,3).map(a=>`<div class="ai">${av({name:a.user,avatar:a.avatar},26)}<div class="ab"><div class="au">${xe(a.user)}</div><div class="at">${xe(a.text.substring(0,110))}${a.text.length>110?'…':''}</div><div class="at2">${ago(a.ts)}</div></div></div>`).join(''):'<div class="noa">No activity in last 24h</div>';
    const eb=p.error?`<span class="b be">${xe(p.error)}</span>`:'';
    const bb=p.blockers&&p.blockers.length?`<span class="b bb">⚠ ${p.blockers.length}</span>`:'';
    const ob=!p.error&&(!p.blockers||!p.blockers.length)?`<span class="b bok">✓ clear</span>`:'';
    return `<div class="pc fade" style="animation-delay:${i*0.05}s"><div class="pc-bar" style="background:${col}"></div><div class="pc-h"><div class="pc-t"><div class="pc-d" style="background:${col};--c:${col}"></div>${xe(p.name)}</div><div class="pc-bs">${eb}${bb}${ob}<span class="b bm">${p.messageCount} msgs</span></div></div><div class="pc-mem">${mems}</div><div class="pc-b"><div class="pcs"><div class="ms"><div class="mv" style="color:var(--green)">${p.tasks?p.tasks.length:0}</div><div class="ml">Tasks</div></div><div class="ms"><div class="mv" style="color:var(--red)">${p.blockers?p.blockers.length:0}</div><div class="ml">Blockers</div></div><div class="ms"><div class="mv" style="color:var(--accent)">${p.members?p.members.length:0}</div><div class="ml">Members</div></div></div><div class="shdr" style="margin-bottom:8px">Recent Activity</div><div class="af">${acts}</div></div></div>`;
  }).join('');
}

function rStandup(su){
  const w=document.getElementById('suw');
  if(!su||!su.length){w.innerHTML=`<div class="sue">📋 No standup updates yet.<br>Ask team to post in <strong>#standup</strong>:<br><br><span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent)">✅ Yesterday: what you did<br>🎯 Today: what you'll do<br>🚨 Blockers: any issues or none</span></div>`;return;}
  w.innerHTML=su.map(s=>{
    const hf=s.yesterday||s.today||s.blockers;
    const bc=s.blockers&&s.blockers.toLowerCase()!=='none'&&s.blockers.trim()?'var(--red)':'var(--green)';
    return `<div class="suc fade"><div class="suh">${av({name:s.user,avatar:s.avatar},30)}<span class="sun">${xe(s.user)}</span><span class="sut">${ago(s.ts)}</span></div>${hf?`<div class="sub"><div class="suss"><div class="susl" style="color:var(--muted)">✅ Yesterday</div><div class="sust">${xe(s.yesterday||'—')}</div></div><div class="suss"><div class="susl" style="color:var(--accent)">🎯 Today</div><div class="sust">${xe(s.today||'—')}</div></div><div class="suss" style="border-color:${bc==='var(--red)'?'rgba(248,113,113,0.2)':'var(--border)'}"><div class="susl" style="color:${bc}">🚨 Blockers</div><div class="sust" style="color:${bc==='var(--red)'?'var(--red)':'var(--muted2)'}">${xe(s.blockers||'—')}</div></div></div>`:`<div class="sur">${xe(s.raw.substring(0,300))}${s.raw.length>300?'…':''}</div>`}</div>`;
  }).join('');
}

function rTasks(ps){
  const w=document.getElementById('tw');
  const all=[];ps.forEach(p=>{if(p.tasks)p.tasks.forEach(t=>all.push({...t,proj:p.name}));});
  if(!all.length){w.innerHTML='<div class="empty">No tasks found yet.<br>Tasks are detected from numbered lists (1. 2. 3.) posted by Mok in project channels.</div>';return;}
  w.innerHTML=all.map((t,i)=>{const col=PC[t.proj]||'#4f9cf9';return `<div class="tr fade" style="animation-delay:${i*0.02}s"><span class="tn">${i+1}</span><div class="tdot" style="background:${col}"></div><div class="tt">${xe(t.text)}</div><div class="tm"><span class="tp" style="color:${col}">${xe(t.proj)}</span><span class="ta">${ago(t.date)}</span></div></div>`;}).join('');
}

function rBlockers(ps){
  const w=document.getElementById('bw');
  const all=[];ps.forEach(p=>{if(p.blockers)p.blockers.forEach(b=>all.push({...b,proj:p.name}));});
  if(!all.length){w.innerHTML='<div class="empty">🟢 No blockers detected across all projects.</div>';return;}
  w.innerHTML=all.map(b=>{const col=PC[b.proj]||'#4f9cf9';return `<div class="bc fade"><div class="bch"><span class="bcu">⚠ ${xe(b.user||'Unknown')}</span><span class="bcp" style="color:${col}">${xe(b.proj)}</span><span class="bca">${ago(b.date)}</span></div><div class="bct">${xe(b.text)}</div></div>`;}).join('');
}

function rTeam(tm){
  const w=document.getElementById('tg');
  const mems=Object.values(tm).filter(m=>m.name&&m.name!=='Unknown');
  if(!mems.length){w.innerHTML='<div class="empty">No team data yet.</div>';return;}
  w.innerHTML=mems.map(m=>{
    const pt=m.projects.map(p=>`<span class="dpt" style="color:${PC[p]||'#4f9cf9'};border-color:${PC[p]||'#4f9cf9'}33">${xe(p)}</span>`).join('');
    const bp=m.blockerCount>0?`<span class="dpl" style="background:rgba(248,113,113,0.08);color:var(--red);border-color:rgba(248,113,113,0.2)">⚠ ${m.blockerCount} blocker${m.blockerCount>1?'s':''}</span>`:`<span class="dpl" style="background:rgba(52,211,153,0.08);color:var(--green);border-color:rgba(52,211,153,0.15)">✓ clear</span>`;
    const pp=`<span class="dpl" style="background:rgba(79,156,249,0.08);color:var(--accent);border-color:rgba(79,156,249,0.15)">${m.projects.length} proj</span>`;
    return `<div class="dc fade"><div class="dct">${av(m,38)}<div><div class="dn">${xe(m.name)}</div><div class="dp">${pt}</div></div></div><div class="dsr">${pp}${bp}</div></div>`;
  }).join('');
}

function updHdr(d){
  const ps=d.projects||[];
  document.getElementById('sp').textContent=ps.length;
  document.getElementById('stk').textContent=ps.reduce((s,p)=>s+(p.tasks?p.tasks.length:0),0);
  document.getElementById('sb').textContent=ps.reduce((s,p)=>s+(p.blockers?p.blockers.length:0),0);
  document.getElementById('ss').textContent=(d.standup||[]).length;
  if(d.lastUpdated)document.getElementById('upd').textContent='Updated '+ago(d.lastUpdated);
  const n=new Date();
  document.getElementById('sd').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('st').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function render(d){updHdr(d);rOver(d.projects||[]);rStandup(d.standup||[]);rTasks(d.projects||[]);rBlockers(d.projects||[]);rTeam(d.team||{});}

function tab(n,el){
  ['o','s','t','b','m'].forEach(x=>document.getElementById('v'+x).classList.add('hidden'));
  document.querySelectorAll('.t').forEach(t=>t.classList.remove('on'));
  document.getElementById('v'+n).classList.remove('hidden');
  el.classList.add('on');
}

function toast(msg){const t=document.getElementById('toast');t.innerHTML=msg;t.style.display='flex';clearTimeout(window._tt);window._tt=setTimeout(()=>t.style.display='none',3000);}

let ph=null;
async function load(silent){
  try{
    const r=await fetch('/api/data'),d=await r.json();
    const h=d.lastUpdated;
    if(!silent){render(d);document.getElementById('loading').style.display='none';}
    else if(h!==ph){render(d);if(ph)toast('🔄 New data from Slack');}
    ph=h;
  }catch(e){
    if(!silent){document.getElementById('loading').innerHTML='<div style="color:var(--red);font-family:DM Mono,monospace;font-size:12px">Connection error. Retrying…</div>';setTimeout(()=>load(false),3000);}
  }
}

async function doRef(){
  const b=document.getElementById('refBtn');
  b.classList.add('spin');b.disabled=true;
  try{await fetch('/api/refresh',{method:'POST'});await load(false);toast('✅ Refreshed');}
  finally{b.classList.remove('spin');b.disabled=false;b.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Refresh';}
}

load(false);
setInterval(()=>load(true),30000);
setInterval(()=>{const n=new Date();document.getElementById('sd').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});document.getElementById('st').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});},60000);
</script>
</body>
</html>
